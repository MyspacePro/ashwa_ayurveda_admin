name: admin_control
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =====================
  # CORE UTILITIES
  # =====================
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  uuid: ^4.5.1
  file_picker: ^8.0.0
  image_picker: ^1.1.2

  # =====================
  # NETWORKING
  # =====================
  http: ^1.2.1

  # =====================
  # UI / TOAST
  # =====================
  fluttertoast: ^8.2.2

  # =====================
  # STATE MANAGEMENT
  # =====================
  provider: ^6.1.2
  get: ^4.6.6

  # =====================
  # LOCAL STORAGE
  # =====================
  shared_preferences: ^2.2.3

  # =====================
  # FIREBASE (LATEST STABLE)
  # =====================
  firebase_core: ^3.15.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.1.0

  # =====================
  # CHARTS
  # =====================
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true